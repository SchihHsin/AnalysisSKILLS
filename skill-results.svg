<svg xmlns="http://www.w3.org/2000/svg" width="960" height="612" viewBox="0 0 960 612" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="960" height="612" fill="#FFFFFF"/>

  <!-- ===== GOLD HEADER BAND ===== -->
  <rect x="0" y="0" width="960" height="60" fill="#F4A800"/>
  <text x="40" y="38" fill="#2A2300" font-size="21" font-weight="800">竞品分析 Skill · 应用结果</text>
  <text x="920" y="38" fill="#6B4E00" font-size="13" text-anchor="end">基于 6 个真实案例汇总 · 2026.06</text>

  <!-- ===== CARD ===== -->
  <rect x="28" y="84" width="904" height="500" rx="14" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1.3"/>

  <!-- 关键结果 -->
  <text x="60" y="126" fill="#1A1714" font-size="18" font-weight="800">关键结果</text>
  <text x="60" y="158" fill="#3A3A3A" font-size="15">6 个案例覆盖 AI CLI、设计工具、AIGC、芯片算子、座舱等 <tspan font-weight="800">6 个垂直领域</tspan>，累计拆解 <tspan font-weight="800">约 20 个竞品</tspan>；</text>
  <text x="60" y="184" fill="#3A3A3A" font-size="15">每个案例 <tspan font-weight="800">1–3 小时</tspan>产出「证据 + 洞察 + 可视化」完整报告，把过去<tspan font-weight="800">数天</tspan>的人工竞品调研压缩到<tspan font-weight="800">小时级</tspan>，</text>
  <text x="60" y="210" fill="#3A3A3A" font-size="15">且全程<tspan font-weight="800">图文对照、来源可追溯</tspan>，拒绝无证据的功能清单堆砌。</text>

  <line x1="60" y1="234" x2="900" y2="234" stroke="#EDEDED" stroke-width="1"/>

  <!-- ===== METRIC ROWS ===== -->
  <!-- row tops: 234 284 334 384 434 484 ; h=50 -->
  <g stroke="#F0F0F0" stroke-width="1">
    <line x1="60" y1="284" x2="900" y2="284"/>
    <line x1="60" y1="334" x2="900" y2="334"/>
    <line x1="60" y1="384" x2="900" y2="384"/>
    <line x1="60" y1="434" x2="900" y2="434"/>
    <line x1="60" y1="484" x2="900" y2="484"/>
    <line x1="60" y1="534" x2="900" y2="534"/>
  </g>

  <g font-size="14.5">
    <text x="60" y="265" fill="#1A1714" font-weight="700">案例数</text>
    <text x="300" y="265" fill="#4A4A4A">6 个竞品分析案例（md / html 两类产出）</text>

    <text x="60" y="315" fill="#1A1714" font-weight="700">覆盖领域</text>
    <text x="300" y="315" fill="#4A4A4A">AI CLI · 设计工具 D2C · AIGC 创意 · 芯片算子 · CANN 看板 · 智能座舱</text>

    <text x="60" y="365" fill="#1A1714" font-weight="700">分析竞品</text>
    <text x="300" y="365" fill="#4A4A4A">约 20 个产品（Cursor / Claude / Figma / Midjourney / 即梦 / CUDA …）</text>

    <text x="60" y="415" fill="#1A1714" font-weight="700">每份标配</text>
    <text x="300" y="415" fill="#4A4A4A">用户旅程地图 · SWOT · 差距矩阵 · 3 条核心洞察 · 行动计划</text>

    <text x="60" y="465" fill="#1A1714" font-weight="700">图文证据</text>
    <text x="300" y="465" fill="#4A4A4A">真实产品截图 + Mockup 复刻，逐条结论图文对照、标注来源</text>

    <text x="60" y="515" fill="#1A1714" font-weight="700">交付成果</text>
    <text x="300" y="515" fill="#4A4A4A">可视化 HTML 报告（多页楼层 + Snap Scroll），可直接用于评审 / 汇报</text>

    <text x="60" y="565" fill="#1A1714" font-weight="700">效率</text>
    <text x="300" y="565" fill="#B8412C" font-weight="700">单份 1–3 小时产出，替代过去数天的人工竞品调研</text>
  </g>
</svg>
