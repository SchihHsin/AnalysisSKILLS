<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="864" viewBox="0 0 1280 864" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDF0F4"/>
      <stop offset="1" stop-color="#FAFBFC"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="864" fill="#FFFFFF"/>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1280" height="150" fill="url(#hg)"/>
  <line x1="0" y1="150" x2="1280" y2="150" stroke="#E2E4E8" stroke-width="1"/>
  <rect x="40" y="43" width="64" height="64" rx="14" fill="#E4E7EB"/>
  <text x="72" y="88" fill="#59616E" font-size="23" font-weight="700" text-anchor="middle">&lt;/&gt;</text>
  <text x="130" y="64" fill="#1B2430" font-size="23" font-weight="800">竞品分析 Skill 的完整工作过程：四阶段流水线 · 10 个 Human-in-the-Loop 检查点，</text>
  <text x="130" y="102" fill="#1B2430" font-size="23" font-weight="800">每个关键节点<tspan fill="#2547A0">先与设计师确认，再往下走</tspan> —— 不闷头跑完整个流程。</text>

  <!-- ================= ROWS ================= -->
  <!-- row tops: 168 280 392 504 616 728 ; h=112 -->

  <!-- divider lines between rows -->
  <g stroke="#E4E6EA" stroke-width="1" stroke-dasharray="1 4">
    <line x1="40" y1="280" x2="1240" y2="280"/>
    <line x1="40" y1="392" x2="1240" y2="392"/>
    <line x1="40" y1="504" x2="1240" y2="504"/>
    <line x1="40" y1="616" x2="1240" y2="616"/>
  </g>

  <!-- ROW 1 -->
  <text x="84" y="238" fill="#C4C9D0" font-size="46" font-weight="400" text-anchor="middle">1</text>
  <text x="148" y="214" fill="#1E2733" font-size="18.5" font-weight="700">意图路由</text>
  <text x="148" y="240" fill="#1E2733" font-size="18.5" font-weight="700">接住用户需求</text>
  <text x="468" y="204" fill="#525B68" font-size="15">解析指令 <tspan font-weight="700" fill="#2A323D">new / continue / visualize / query / fast</tspan>，识别本次意图。</text>
  <text x="468" y="230" fill="#525B68" font-size="15">判断是新建分析、恢复中断，还是对已有报告做增量更新；空指令进入完整引导。</text>

  <!-- ROW 2 -->
  <text x="84" y="350" fill="#C4C9D0" font-size="46" font-weight="400" text-anchor="middle">2</text>
  <text x="148" y="326" fill="#1E2733" font-size="18.5" font-weight="700">明确目标</text>
  <text x="148" y="352" fill="#1E2733" font-size="18.5" font-weight="700">锁定分析视角</text>
  <text x="468" y="316" fill="#525B68" font-size="15">复述用户的决策目标，推断 <tspan font-weight="700" fill="#2A323D">UX / PM / UI / Tech / Strategy</tspan> 主视角，</text>
  <text x="468" y="342" fill="#525B68" font-size="15">此后分析维度、报告骨架、对比表行维度<tspan font-weight="700" fill="#2A323D">全程跟随该视角</tspan>。</text>
  <text x="468" y="368" fill="#2547A0" font-size="14.5" font-weight="700">⏸ 等用户确认目标与视角</text>

  <!-- ROW 3 -->
  <text x="84" y="462" fill="#C4C9D0" font-size="46" font-weight="400" text-anchor="middle">3</text>
  <text x="148" y="438" fill="#1E2733" font-size="18.5" font-weight="700">圈定范围</text>
  <text x="148" y="464" fill="#1E2733" font-size="18.5" font-weight="700">生成分析规划</text>
  <text x="468" y="428" fill="#525B68" font-size="15">给出竞品名单（<tspan font-weight="700" fill="#2A323D">直接竞品 + 跨行业体验标杆</tspan>）、核心场景、≤ 5 个分析维度；</text>
  <text x="468" y="454" fill="#525B68" font-size="15">整合为完整规划，存入 <tspan font-weight="700" fill="#2A323D">tracking/</tspan>，并预估耗时。</text>
  <text x="468" y="480" fill="#2547A0" font-size="14.5" font-weight="700">⏸ 等用户批准规划</text>

  <!-- ROW 4 -->
  <text x="84" y="574" fill="#C4C9D0" font-size="46" font-weight="400" text-anchor="middle">4</text>
  <text x="148" y="550" fill="#1E2733" font-size="18.5" font-weight="700">多源搜集</text>
  <text x="148" y="576" fill="#1E2733" font-size="18.5" font-weight="700">留存图文证据</text>
  <text x="468" y="540" fill="#525B68" font-size="15"><tspan font-weight="700" fill="#2A323D">官方一手 &gt; 权威评测 &gt; UGC</tspan> 多源交叉核查；浏览器截图采集后做</text>
  <text x="468" y="566" fill="#525B68" font-size="15">多模态视觉解析，确认是真实 UI；素材落到 <tspan font-weight="700" fill="#2A323D">materials/</tspan>，缺口主动汇报。</text>
  <text x="468" y="592" fill="#2547A0" font-size="14.5" font-weight="700">⏸ 信息缺口由用户决策</text>

  <!-- ROW 5 -->
  <text x="84" y="686" fill="#C4C9D0" font-size="46" font-weight="400" text-anchor="middle">5</text>
  <text x="148" y="662" fill="#1E2733" font-size="18.5" font-weight="700">洞察分析</text>
  <text x="148" y="688" fill="#1E2733" font-size="18.5" font-weight="700">产出 MD 报告</text>
  <text x="468" y="652" fill="#525B68" font-size="15">用户旅程地图 + SWOT + 差距矩阵；每条洞察含 <tspan font-weight="700" fill="#2A323D">证据 / 分析 / 建议</tspan>；</text>
  <text x="468" y="678" fill="#525B68" font-size="15">先确认 <tspan font-weight="700" fill="#2A323D">3 条洞察草稿方向</tspan>，再展开写完整 Markdown 报告。</text>
  <text x="468" y="704" fill="#2547A0" font-size="14.5" font-weight="700">⏸ 等用户确认草稿方向</text>

  <!-- ROW 6 (HIGHLIGHT) -->
  <rect x="0" y="728" width="1280" height="112" fill="#F4A800"/>
  <text x="84" y="798" fill="#7A5800" font-size="46" font-weight="700" text-anchor="middle">6</text>
  <text x="148" y="774" fill="#16347F" font-size="18.5" font-weight="800">可视化报告</text>
  <text x="148" y="800" fill="#16347F" font-size="18.5" font-weight="800">对外交付成果</text>
  <text x="468" y="764" fill="#2A2300" font-size="15"><tspan font-weight="800">可选阶段 · 最终成果交付：</tspan>按 Stage 1 视角自动选骨架 <tspan font-weight="800">S1–S5</tspan>，</text>
  <text x="468" y="790" fill="#2A2300" font-size="15">生成多页楼层 + Snap Scroll + Mockup 变体的 HTML 报告，质量自审后交付。</text>
  <text x="468" y="816" fill="#5A4400" font-size="14.5">用于对外展示 / 评审 / 长期资产时才做；不需要可直接停在第 5 步的 Markdown 报告。</text>
</svg>
